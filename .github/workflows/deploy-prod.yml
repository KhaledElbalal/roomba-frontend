name: Deploy Production

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        id: push
        env:
          REG: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
          # Baked into the Next.js bundle at build time
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            -t "$REG/roomba-frontend:$TAG" \
            .
          docker push "$REG/roomba-frontend:$TAG"
          echo "image=$REG/roomba-frontend:$TAG" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy App Runner service
        env:
          IMAGE:                 ${{ needs.build.outputs.image }}
          ACCESS_ROLE_ARN:       ${{ secrets.APPRUNNER_ACCESS_ROLE_ARN }}
          INSTANCE_ROLE_ARN:     ${{ secrets.APPRUNNER_INSTANCE_ROLE_ARN }}
          NEON_BASE_URL_ARN:     ${{ secrets.NEON_AUTH_BASE_URL_SECRET_ARN }}
          NEON_COOKIE_ARN:       ${{ secrets.NEON_AUTH_COOKIE_SECRET_ARN }}
          NEON_BRIDGE_ARN:       ${{ secrets.NEON_AUTH_BRIDGE_SECRET_ARN }}
        run: |
          set -euo pipefail

          # Look up by name — works on first run (no ARN secret needed)
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='roomba-frontend-prod'].ServiceArn | [0]" \
            --output text 2>/dev/null || echo "")
          [ "$SERVICE_ARN" = "None" ] && SERVICE_ARN=""

          # A service stuck in CREATE_FAILED/DELETE_FAILED can't be updated —
          # delete it and recreate from scratch.
          if [ -n "$SERVICE_ARN" ]; then
            CUR_STATUS=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" \
              --query Service.Status --output text 2>/dev/null || echo "")
            if [ "$CUR_STATUS" = "CREATE_FAILED" ] || [ "$CUR_STATUS" = "DELETE_FAILED" ]; then
              echo "Service is $CUR_STATUS — deleting before recreating …"
              aws apprunner delete-service --service-arn "$SERVICE_ARN" >/dev/null
              for i in $(seq 1 30); do
                # describe-service keeps returning the service with Status=DELETED
                # after deletion finishes, so break on the status — not on the call
                # failing (which only happens much later).
                DEL_STATUS=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" \
                  --query Service.Status --output text 2>/dev/null || echo "GONE")
                case "$DEL_STATUS" in DELETED|GONE) break ;; esac
                echo "  waiting for deletion ($i/30) …"; sleep 10
              done
              SERVICE_ARN=""
            fi
          fi

          if [ -z "$SERVICE_ARN" ]; then
            echo "Creating frontend App Runner service for the first time …"
            RESULT=$(aws apprunner create-service \
              --service-name "roomba-frontend-prod" \
              --source-configuration "$(jq -n \
                --arg img        "$IMAGE" \
                --arg role       "$ACCESS_ROLE_ARN" \
                --arg base_url   "$NEON_BASE_URL_ARN" \
                --arg cookie     "$NEON_COOKIE_ARN" \
                --arg bridge     "$NEON_BRIDGE_ARN" \
                '{
                  ImageRepository: {
                    ImageIdentifier: $img,
                    ImageRepositoryType: "ECR",
                    ImageConfiguration: {
                      Port: "3000",
                      RuntimeEnvironmentSecrets: {
                        NEON_AUTH_BASE_URL:      $base_url,
                        NEON_AUTH_COOKIE_SECRET: $cookie,
                        NEON_AUTH_BRIDGE_SECRET: $bridge
                      }
                    }
                  },
                  AuthenticationConfiguration: {AccessRoleArn: $role},
                  AutoDeploymentsEnabled: false
                }')" \
              --instance-configuration "InstanceRoleArn=${INSTANCE_ROLE_ARN}" \
              --health-check-configuration "Protocol=HTTP,Path=/")
            SERVICE_ARN=$(echo "$RESULT" | jq -r '.Service.ServiceArn')
            echo "Created: $SERVICE_ARN"
          else
            echo "Updating existing service …"
            CURRENT=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query Service.SourceConfiguration --output json)

            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration "$(echo "$CURRENT" | jq \
                --arg img "$IMAGE" '.ImageRepository.ImageIdentifier = $img')"
          fi

          for i in $(seq 1 20); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query Service.Status --output text)
            [ "$STATUS" = "RUNNING" ] && echo "Deployed successfully" && break
            echo "  Status: $STATUS ($i/20) …"
            sleep 30
          done
